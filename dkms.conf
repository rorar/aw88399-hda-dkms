PACKAGE_NAME="aw88399-hda"
PACKAGE_VERSION="1.0"
AUTOINSTALL="yes"

MAKE="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"

# Module 0: Patched Realtek ALC269 codec (with AW88399 fixup)
BUILT_MODULE_NAME[0]="snd-hda-codec-alc269"
BUILT_MODULE_LOCATION[0]="realtek/"
DEST_MODULE_LOCATION[0]="/updates/dkms"

# Module 1: Patched ASoC AW88399 codec (with exports)
BUILT_MODULE_NAME[1]="snd-soc-aw88399"
BUILT_MODULE_LOCATION[1]="soc-codecs/"
DEST_MODULE_LOCATION[1]="/updates/dkms"

# Module 2: New HDA side codec driver
BUILT_MODULE_NAME[2]="snd-hda-scodec-aw88399"
BUILT_MODULE_LOCATION[2]="side-codecs/"
DEST_MODULE_LOCATION[2]="/updates/dkms"

# Module 3: New HDA I2C interface
BUILT_MODULE_NAME[3]="snd-hda-scodec-aw88399-i2c"
BUILT_MODULE_LOCATION[3]="side-codecs/"
DEST_MODULE_LOCATION[3]="/updates/dkms"

# Module 4: Patched serial-multi-instantiate
BUILT_MODULE_NAME[4]="serial-multi-instantiate"
BUILT_MODULE_LOCATION[4]="./"
DEST_MODULE_LOCATION[4]="/updates/dkms"

# Module 5: Setup helper (scan.c workaround)
BUILT_MODULE_NAME[5]="aw88399-setup"
BUILT_MODULE_LOCATION[5]="./"
DEST_MODULE_LOCATION[5]="/updates/dkms"
